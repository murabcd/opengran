name: release-macos

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prepare notarization key
        if: ${{ secrets.APPLE_API_KEY != '' }}
        run: |
          mkdir -p private_keys
          printf '%s' "$APPLE_API_KEY" > private_keys/AuthKey.p8
          echo "APPLE_API_KEY=$PWD/private_keys/AuthKey.p8" >> "$GITHUB_ENV"
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}

      - name: Build and publish macOS desktop release
        run: bun run release:mac
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
