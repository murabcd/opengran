name: release-macos

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-macos-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-macos:
    runs-on: macos-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate tag matches desktop version
        run: |
          expected_tag="v$(node -p "require('./apps/desktop/package.json').version")"

          if [ "$GITHUB_REF_NAME" != "$expected_tag" ]; then
            echo "Release tag mismatch."
            echo "Expected: $expected_tag"
            echo "Actual:   $GITHUB_REF_NAME"
            exit 1
          fi

      - name: Validate workspace
        run: |
          bun run check
          bun run typecheck
          bun run test

      - name: Validate Convex production deploy configuration
        env:
          CONVEX_DEPLOY_KEY_SECRET: ${{ secrets.CONVEX_DEPLOY_KEY_PROD }}
        run: |
          if [ -z "$CONVEX_DEPLOY_KEY_SECRET" ]; then
            echo "Missing required secret: CONVEX_DEPLOY_KEY_PROD"
            echo "Generate a production deploy key for precious-crane-700 in the Convex dashboard and add it as a GitHub Actions secret."
            exit 1
          fi

      - name: Deploy Convex production backend
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY_PROD }}
        run: bunx convex deploy --typecheck disable

      - name: Validate signing configuration
        env:
          REQUIRE_MACOS_SIGNING: ${{ vars.REQUIRE_MACOS_SIGNING || 'false' }}
          APPLE_API_ISSUER_SECRET: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_ID_SECRET: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_SECRET_VALUE: ${{ secrets.APPLE_API_KEY }}
          CSC_KEY_PASSWORD_SECRET: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_LINK_SECRET: ${{ secrets.CSC_LINK }}
        run: |
          missing=""

          for name in APPLE_API_ISSUER_SECRET APPLE_API_KEY_ID_SECRET APPLE_API_KEY_SECRET_VALUE CSC_KEY_PASSWORD_SECRET CSC_LINK_SECRET; do
            if [ -z "${!name}" ]; then
              missing="${missing} ${name}"
            fi
          done

          if [ -n "$missing" ]; then
            if [ "$REQUIRE_MACOS_SIGNING" = "true" ]; then
              echo "Missing required release secrets:${missing}"
              echo "REQUIRE_MACOS_SIGNING=true, so refusing to publish an unsigned or unnotarized public macOS release."
              exit 1
            fi

            echo "Signing secrets not configured:${missing}"
            echo "Continuing with an unsigned, non-notarized macOS release."
          fi

      - name: Prepare release environment
        env:
          APPLE_API_ISSUER_SECRET: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_ID_SECRET: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_SECRET_VALUE: ${{ secrets.APPLE_API_KEY }}
          CSC_KEY_PASSWORD_SECRET: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_LINK_SECRET: ${{ secrets.CSC_LINK }}
        run: |
          if [ -n "$APPLE_API_ISSUER_SECRET" ]; then
            echo "APPLE_API_ISSUER=$APPLE_API_ISSUER_SECRET" >> "$GITHUB_ENV"
          fi

          if [ -n "$APPLE_API_KEY_ID_SECRET" ]; then
            echo "APPLE_API_KEY_ID=$APPLE_API_KEY_ID_SECRET" >> "$GITHUB_ENV"
          fi

          if [ -n "$APPLE_API_KEY_SECRET_VALUE" ]; then
            echo "APPLE_API_KEY_SECRET=$APPLE_API_KEY_SECRET_VALUE" >> "$GITHUB_ENV"
          fi

          if [ -n "$CSC_KEY_PASSWORD_SECRET" ]; then
            echo "CSC_KEY_PASSWORD=$CSC_KEY_PASSWORD_SECRET" >> "$GITHUB_ENV"
          fi

          if [ -n "$CSC_LINK_SECRET" ]; then
            echo "CSC_LINK=$CSC_LINK_SECRET" >> "$GITHUB_ENV"
          fi

      - name: Prepare notarization key
        env:
          APPLE_API_KEY_SECRET: ${{ secrets.APPLE_API_KEY }}
        run: |
          if [ -z "$APPLE_API_KEY_SECRET" ]; then
            exit 0
          fi

          mkdir -p private_keys
          printf '%s' "$APPLE_API_KEY_SECRET" > private_keys/AuthKey.p8
          echo "APPLE_API_KEY=$PWD/private_keys/AuthKey.p8" >> "$GITHUB_ENV"

      - name: Build and publish macOS desktop release
        run: bun run release:mac
