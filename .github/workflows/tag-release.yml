name: tag-release

on:
  push:
    branches:
      - "main"
    paths:
      - "apps/desktop/package.json"

permissions:
  actions: write
  contents: write

concurrency:
  group: tag-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tag-desktop-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Detect release tag
        id: release
        run: |
          version="$(node -p "require('./apps/desktop/package.json').version")"
          tag="v${version}"

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

          if git rev-parse "${tag}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${tag} already exists. Nothing to do."
            exit 0
          fi

          echo "exists=false" >> "$GITHUB_OUTPUT"

      - name: Create release tag
        if: steps.release.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.release.outputs.tag }}" -m "release ${{ steps.release.outputs.tag }}"
          git push origin "${{ steps.release.outputs.tag }}"

      - name: Dispatch macOS release workflow
        if: steps.release.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run release-macos.yml --ref "${{ steps.release.outputs.tag }}"
